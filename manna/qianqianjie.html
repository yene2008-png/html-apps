<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>千千节</title>
  <link rel="stylesheet" href="css/style.css" />
  <meta name="theme-color" content="#8a5a2b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="千千节" />
  <link rel="icon" type="image/svg+xml" href="icons/bi.svg" />
  <link rel="apple-touch-icon" href="icons/bi-180.png" />
  <link rel="manifest" href="manifest-bi.json" />
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () { navigator.serviceWorker.register("sw.js"); });
    }
  </script>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <button id="langToggle" class="lang-toggle">English</button>
      <h1>千千节</h1>
      <div id="today" class="today"></div>
      <div id="userBar" class="userbar" style="display:none">
        <span><span data-i18n="reader">背经者：</span><b id="userName"></b></span>
        <button id="btnReminderJump" class="link" data-i18n="reminderJump">⏰ 提醒</button>
        <button id="btnSwitchTopic" class="link" data-i18n="switchTopic">切换主题</button>
        <button id="btnSwitchUser" class="link" data-i18n="switchUser">换用户</button>
      </div>
    </header>

    <!-- 登录 -->
    <section id="loginCard" class="card" style="display:none">
      <h2 data-i18n="welcome">欢迎</h2>
      <p class="muted" data-i18n="welcomeDesc">输入你的名字开始。应用会记住从今天起你的背经进度。</p>
      <div class="row">
        <input id="nameInput" type="text" data-i18n-ph="namePh" placeholder="请输入用户名" maxlength="30" />
        <button id="btnStart" class="primary" data-i18n="start">开始</button>
      </div>
    </section>

    <!-- 选主题 -->
    <section id="topicCard" class="card" style="display:none">
      <h2 data-i18n="chooseTopic">选择背诵主题</h2>
      <p class="muted" data-i18n="chooseDesc">从下面任选一个主题，之后每天为你显示其中一节经文。</p>
      <div class="row">
        <select id="topicSelect"></select>
        <button id="btnChooseTopic" class="primary" data-i18n="startTopic">就背这个</button>
      </div>
    </section>

    <!-- 背经 + 填空 -->
    <section id="studyCard" class="card" style="display:none">
      <div class="study-head">
        <span id="topicLabel" class="chip"></span>
        <span id="progressLabel" class="muted"></span>
      </div>

      <div class="verse">
        <div id="verseRef" class="verse-ref"></div>
        <p id="verseMain" class="verse-zh"></p>
        <p id="verseSub" class="verse-en"></p>
        <p id="verseNote" class="verse-note" style="display:none"></p>
      </div>

      <div id="prayPrompt" class="pray" style="display:none">
        <div class="pray-title" data-i18n="prayTitle">请先祷读这节经文</div>
        <div class="pray-sub" data-i18n="praySub">把经文当作祷告，向主轻声读出来。</div>
        <div id="prayCountdown" class="pray-count">3:00</div>
        <button id="btnStartCloze" class="primary" data-i18n="prayBtn">我祷读好了，开始填空</button>
        <div class="pray-note muted" data-i18n="prayNote">时间到会自动进入填空题</div>
      </div>

      <div class="cloze">
        <div class="cloze-head">
          <h3 data-i18n="clozeTitle">填空练习</h3>
          <label class="difficulty"><span data-i18n="difficulty">难度</span>
            <select id="difficultySelect">
              <option value="easy" data-i18n="diffEasy">简单</option>
              <option value="medium" data-i18n="diffMedium">中等</option>
              <option value="hard" data-i18n="diffHard">困难</option>
            </select>
          </label>
        </div>
        <p class="cloze-text">
          <span id="clozeBefore"></span><span id="clozeBlank" class="blank"></span><span id="clozeAfter"></span>
        </p>
        <div class="row">
          <input id="clozeInput" type="text" data-i18n-ph="clozePh" placeholder="在此填入空格处的内容" />
          <button id="btnCheck" class="primary" data-i18n="check">检查</button>
        </div>
        <div class="row btns">
          <button id="btnHint" class="ghost" data-i18n="hintBtn">提示</button>
          <button id="btnReveal" class="ghost" data-i18n="revealBtn">显示答案</button>
        </div>
        <div id="clozeFeedback" class="feedback"></div>
      </div>

      <div id="doneBanner" class="done" style="display:none" data-i18n="doneBanner">
        🎉 你已背到本主题的最后一节。可点上方「切换主题」继续。
      </div>

      <div class="stats">
        <h3 data-i18n="statsTitle">打卡统计</h3>
        <div class="stat-grid">
          <div class="stat"><b id="statStreak">0</b><span data-i18n="statStreak">连续打卡（天）</span></div>
          <div class="stat"><b id="statLongest">0</b><span data-i18n="statLongest">最长连续（天）</span></div>
          <div class="stat"><b id="statTotal">0</b><span data-i18n="statTotal">累计打卡（天）</span></div>
          <div class="stat"><b id="statCorrect">0</b><span data-i18n="statCorrect">累计答对（节）</span></div>
        </div>
        <div id="todayStatus" class="today-status"></div>
        <div class="cal-wrap">
          <div class="cal-title muted" data-i18n="last14">最近 14 天</div>
          <div id="calendar" class="calendar"></div>
        </div>
      </div>

      <div class="reminder">
        <h3 data-i18n="reminderTitle">每日提醒</h3>
        <p class="muted" data-i18n="reminderDesc">选一个时间，加到手机日历，每天到点提醒你来背经。</p>
        <div class="row">
          <input id="reminderTime" type="time" />
          <button id="btnAddReminder" class="primary" data-i18n="reminderAdd">添加到日历</button>
        </div>
        <div id="reminderMsg" class="reminder-msg" style="display:none"></div>
      </div>
    </section>

    <footer class="foot muted" data-i18n="foot">
      经文取自《1000处极重要的经节》。数据离线保存在本机浏览器中。
    </footer>
  </div>

  <script src="data/verses.js"></script>
  <script src="js/cloze.js"></script>
  <script src="js/cloze-en.js"></script>
  <script>
    window.APP_LANG = "zh";          // 默认中文，可一键切换
    window.APP_STORE_KEY = "qianqianjie"; // 中英共享同一进度
  </script>
  <script src="js/app.js"></script>
</body>
</html>
